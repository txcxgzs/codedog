version: '3.8'

services:
  codedog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codedog
    ports:
      - "3001:3001"
    volumes:
      # 持久化数据（数据库、上传文件）
      - ./data:/app/server/data
      - ./uploads:/app/server/uploads
    environment:
      - NODE_ENV=production
      - DB_TYPE=sqlite
      - DB_PATH=/app/server/data/database.sqlite
      # 如果使用MySQL，取消注释以下配置
      # - DB_TYPE=mysql
      # - MYSQL_HOST=your_host
      # - MYSQL_PORT=3306
      # - MYSQL_DATABASE=codedog
      # - MYSQL_USERNAME=your_user
      # - MYSQL_PASSWORD=your_password
    restart: unless-stopped
