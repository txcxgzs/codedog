services:
  codedog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codedog
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/server/data
      - ./uploads:/app/server/uploads
      - ./.data:/app/.data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_TYPE=\
      - DB_PATH=\
      - DB_HOST=\
      - DB_PORT=\
      - DB_NAME=\
      - DB_USER=\
      - DB_PASSWORD=\
      - JWT_SECRET=\
      - JWT_EXPIRES_IN=\
      - SESSION_SECRET=\
      - CORS_ORIGIN=\
      - TRUST_PROXY=\
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Maintenance page - runs on port 3001 during updates
  # Usage: docker compose --profile maintenance up -d --no-deps maintenance
  maintenance:
    image: nginx:alpine
    container_name: codedog-maintenance
    ports:
      - "3001:3001"
    volumes:
      - ./maintenance:/usr/share/nginx/html:ro
      - ./maintenance/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - maintenance
    mem_limit: 32m
    cpus: '0.1'
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"