services:
  codedog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codedog
    ports:
      - "3001:3001"
    volumes:
      # 持久化数据（数据库、上传文件）
      - ./data:/app/server/data
      - ./uploads:/app/server/uploads
    # 从宿主 .env 文件注入环境变量（修复：生产环境必须提供密钥与CORS配置）
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_TYPE=sqlite
      - DB_PATH=/app/server/data/database.sqlite
      # 修复：显式注入生产必需变量，缺失时容器启动即 exit(1)
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      # 如果使用MySQL，取消注释以下配置
      # - DB_TYPE=mysql
      # - MYSQL_HOST=your_host
      # - MYSQL_PORT=3306
      # - MYSQL_DATABASE=codedog
      # - MYSQL_USERNAME=your_user
      # - MYSQL_PASSWORD=your_password
    restart: unless-stopped
    # 修复：资源限制，防止单容器耗尽宿主资源
    mem_limit: 512m
    cpus: '1.0'
    # 修复：健康检查，定期用 curl 探测 /api/health 接口
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 修复：日志轮转，避免日志文件无限增长撑满磁盘
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
