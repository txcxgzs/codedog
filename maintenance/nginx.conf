server {
    listen 3001;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check bypass - let codedog's health check through
    location /api/health {
        return 503 '{"status":"maintenance","message":"系统正在升级维护"}';
    }

    # All other requests -> maintenance page
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Retry-After 120 always;
    }
}