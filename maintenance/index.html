<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统维护中 - 编程狗</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
.container{text-align:center;padding:40px;max-width:480px}
.icon{font-size:80px;margin-bottom:24px;animation:spin 3s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
h1{font-size:28px;margin-bottom:16px;font-weight:600}
.message{font-size:16px;line-height:1.6;opacity:.9;margin-bottom:32px}
.progress{width:200px;height:4px;background:rgba(255,255,255,.3);border-radius:2px;margin:0 auto;overflow:hidden}
.progress-bar{width:30%;height:100%;background:#fff;border-radius:2px;animation:progress 2s ease-in-out infinite}
@keyframes progress{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.retry{margin-top:24px;font-size:14px;opacity:.7}
</style>
</head>
<body>
<div class="container">
<div class="icon">&#9881;</div>
<h1>系统维护中</h1>
<p class="message">系统正在升级维护，请稍后再试...<br>预计很快完成，感谢您的耐心等待</p>
<div class="progress"><div class="progress-bar"></div></div>
<p class="retry">页面将自动刷新</p>
</div>
<script>setInterval(()=>{fetch('/api/health').then(r=>{if(r.ok)window.location.reload()}).catch(()=>{})},15000)</script>
</body>
</html>
