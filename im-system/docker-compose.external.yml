services:
  im-server:
    build: { context: ., target: server }
    restart: unless-stopped
    env_file: [.env]
    environment:
      NODE_ENV: production
      IM_PORT: 3100
      IM_SSO_PUBLIC_KEY_FILE: /run/secrets/im_sso_public.pem
    volumes: ["./secrets/im_sso_public.pem:/run/secrets/im_sso_public.pem:ro"]
    # Alpine 中 localhost 可能优先解析为 ::1，而 Node 当前监听 IPv4；固定回环 IPv4 防止误报 unhealthy。
    healthcheck: { test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/health"], interval: 15s, timeout: 5s, retries: 5 }
  im-web:
    build: { context: ., target: frontend }
    restart: unless-stopped
    # 仅监听本机，必须由宿主机 Nginx/Caddy 对外反向代理，禁止直接暴露 IM 端口。
    ports: ["${IM_BIND_HOST:-127.0.0.1}:${IM_HTTP_PORT:-8100}:80"]
    depends_on: { im-server: { condition: service_healthy } }
