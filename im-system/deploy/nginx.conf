map $http_upgrade $connection_upgrade { default upgrade; '' close; }
server {
  listen 80;
  server_name _;
  # Dockerfile 将两个前端构建产物放在此目录下；缺少 root 会让 try_files
  # 去默认配置目录查找并反复回退到 /im/index.html，最终形成重定向循环。
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 6m;

  location = / { return 302 /im/; }
  location = /im/health { proxy_pass http://im-server:3100/health; }
  location /im/api/ { proxy_pass http://im-server:3100/api/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
  location /im/ws { proxy_pass http://im-server:3100/ws; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; proxy_set_header Host $host; }
  location /im/admin/ { try_files $uri $uri/ /im/admin/index.html; }
  location /im/ { try_files $uri $uri/ /im/index.html; }
}
